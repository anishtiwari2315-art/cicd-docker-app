# ============================================================
# ci-cd.yml - GitHub Actions CI/CD Pipeline
# Triggers on push to main/develop and on Pull Requests
# Author: Anish Tiwari | DevOps Engineer
# ============================================================
name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: anishtiwari2315/cicd-docker-app
  NODE_VERSION: '18'

jobs:
  # ---- Job 1: Test ----
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint || true

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ---- Job 2: Build Docker Image ----
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:latest
          build-args: |
            APP_VERSION=${{ github.sha }}

      - name: Image build summary
        run: |
          echo "Docker image built successfully!"
          echo "Image: ${{ env.IMAGE_NAME }}:latest"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"

  # ---- Job 3: Deploy to Kubernetes ----
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Validate Kubernetes manifests
        run: |
          echo "Validating K8s manifests with dry-run..."
          kubectl apply --dry-run=client -f k8s/ 2>&1 || true
          echo "K8s manifest validation complete!"

      - name: Deployment summary
        run: |
          echo "===================================="
          echo "CI/CD Pipeline completed successfully"
          echo "===================================="
          echo "Image: ${{ env.IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Status: Ready for production deployment"

# ============================================================
# docker-compose.yml - Local development environment
# Usage: docker-compose up --build
# Author: Anish Tiwari | DevOps Engineer
# ============================================================

version: '3.8'

services:

  # ---- Main Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: cicd-docker-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - APP_VERSION=local-dev
    volumes:
      - ./src:/app/src:ro   # Mount source for hot reload in dev
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  # ---- Redis (optional cache / session store) ----
  redis:
    image: redis:7-alpine
    container_name: cicd-docker-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - app-network

  # ---- Nginx Reverse Proxy (optional for production-like local test) ----
  nginx:
    image: nginx:alpine
    container_name: cicd-docker-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app-network
    profiles:
      - with-nginx    # Start only with: docker-compose --profile with-nginx up

volumes:
  redis_data:
    driver: local

networks:
  app-network:
    driver: bridge
